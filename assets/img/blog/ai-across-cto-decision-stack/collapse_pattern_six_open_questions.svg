       font-weight="700"
       id="text6">Layer 1 — Strategy</text>
    <text
       x="504"
       y="78"
       text-anchor="end"
       font-style="italic"
       id="text7">Does the SWOT still hold?</text>
    <text
       x="140"
       y="141"
       font-weight="700"
       id="text8">Layer 2 — Product Architecture</text>
    <text
       x="482"
       y="141"
