<svg viewBox="0 0 720 480" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow6" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>

  <text x="360" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">
    Every Cycle Eventually Requires Governance
  </text>
  <text x="360" y="56" text-anchor="middle" font-size="13" fill="#64748b">
    AI is not a new pattern — it's the same recurring pattern, on a new surface
  </text>

  <!-- Column headers -->
  <g font-size="13" font-weight="700" fill="#334155">
    <text x="180" y="100" text-anchor="middle">Cheap / Fast Phase</text>
    <text x="360" y="100" text-anchor="middle">Cost or Drift Surfaces</text>
    <text x="540" y="100" text-anchor="middle">Governance Phase</text>
  </g>

  <!-- divider lines -->
  <line x1="280" y1="80" x2="280" y2="420" stroke="#e2e8f0" stroke-width="1.5"/>
  <line x1="460" y1="80" x2="460" y2="420" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- Row: Cloud -->
  <g font-size="13">
    <text x="40" y="145" font-weight="700" fill="#1e293b">Cloud Infrastructure</text>
    <rect x="60" y="155" width="220" height="30" rx="5" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="1.2"/>
    <text x="170" y="175" text-anchor="middle" fill="#075985">Cloud-first, cheap to start</text>
    <rect x="280" y="155" width="180" height="30" rx="5" fill="#fff7ed" stroke="#f97316" stroke-width="1.2"/>
    <text x="370" y="175" text-anchor="middle" fill="#7c2d12">Quietly expensive at scale</text>
    <rect x="460" y="155" width="220" height="30" rx="5" fill="#ecfdf5" stroke="#10b981" stroke-width="1.2"/>
    <text x="570" y="175" text-anchor="middle" fill="#065f46">Infrastructure governance</text>
  </g>

  <!-- Row: Process -->
  <g font-size="13">
    <text x="40" y="215" font-weight="700" fill="#1e293b">Process</text>
    <rect x="60" y="225" width="220" height="30" rx="5" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="1.2"/>
    <text x="170" y="245" text-anchor="middle" fill="#075985">Agile, lightweight</text>
    <rect x="280" y="225" width="180" height="30" rx="5" fill="#fff7ed" stroke="#f97316" stroke-width="1.2"/>
    <text x="370" y="245" text-anchor="middle" fill="#7c2d12">Coordination chaos at scale</text>
    <rect x="460" y="225" width="220" height="30" rx="5" fill="#ecfdf5" stroke="#10b981" stroke-width="1.2"/>
    <text x="570" y="245" text-anchor="middle" fill="#065f46">Process governance</text>
  </g>

  <!-- Row: Architecture -->
  <g font-size="13">
    <text x="40" y="285" font-weight="700" fill="#1e293b">Architecture</text>
    <rect x="60" y="295" width="220" height="30" rx="5" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="1.2"/>
    <text x="170" y="315" text-anchor="middle" fill="#075985">Ship fast, monolith</text>
    <rect x="280" y="295" width="180" height="30" rx="5" fill="#fff7ed" stroke="#f97316" stroke-width="1.2"/>
    <text x="370" y="315" text-anchor="middle" fill="#7c2d12">Coupling, drift</text>
    <rect x="460" y="295" width="220" height="30" rx="5" fill="#ecfdf5" stroke="#10b981" stroke-width="1.2"/>
    <text x="570" y="315" text-anchor="middle" fill="#065f46">Boundary governance</text>
  </g>

  <!-- Row: AI - highlighted -->
  <g font-size="13">
    <text x="40" y="367" font-weight="700" fill="#1e293b">AI-Assisted Development</text>
    <rect x="60" y="377" width="220" height="34" rx="5" fill="#fefce8" stroke="#eab308" stroke-width="2"/>
    <text x="170" y="399" text-anchor="middle" fill="#854d0e" font-weight="700">Generation, cheap</text>
    <rect x="280" y="377" width="180" height="34" rx="5" fill="#fefce8" stroke="#eab308" stroke-width="2"/>
    <text x="370" y="399" text-anchor="middle" fill="#854d0e" font-weight="700">Comprehension gap</text>
    <rect x="460" y="377" width="220" height="34" rx="5" fill="#fefce8" stroke="#eab308" stroke-width="2"/>
    <text x="570" y="399" text-anchor="middle" fill="#854d0e" font-weight="700">Comprehension governance</text>
  </g>

  <!-- arrows between phases for AI row -->
  <g stroke="#475569" stroke-width="1.8" marker-end="url(#arrow6)">
    <line x1="280" y1="394" x2="278" y2="394"/>
    <line x1="460" y1="394" x2="458" y2="394"/>
  </g>

  <text x="360" y="450" text-anchor="middle" font-size="13" fill="#64748b">
    Every previous cycle eventually discovered the governance it had deferred.
  </text>
  <text x="360" y="470" text-anchor="middle" font-size="13" fill="#64748b">
    AI is not exempt from this — it's earlier in the same arc, on a new surface.
  </text>
</svg>
