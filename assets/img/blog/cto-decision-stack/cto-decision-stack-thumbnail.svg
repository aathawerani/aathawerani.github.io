<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="'Georgia', serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c0f18"/>
      <stop offset="100%" stop-color="#141824"/>
    </linearGradient>
    <linearGradient id="stackglow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4caf6e" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#5b9ad4" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>

  <!-- Left: stacked layer bars decorative -->
  <rect x="60" y="110" width="340" height="58" rx="4" fill="url(#stackglow)"/>
  <rect x="60" y="110" width="4" height="58" rx="2" fill="#4caf6e"/>
  <text x="84" y="133" font-size="11" fill="#4caf6e" letter-spacing="2" opacity="0.9">LAYER 1</text>
  <text x="84" y="154" font-size="16" fill="#d8d8d8">Corporate &amp; Business Strategy</text>

  <rect x="60" y="174" width="340" height="58" rx="4" fill="url(#stackglow)" opacity="0.8"/>
  <rect x="60" y="174" width="4" height="58" rx="2" fill="#5b8fd4"/>
  <text x="84" y="197" font-size="11" fill="#5b8fd4" letter-spacing="2" opacity="0.9">LAYER 2</text>
  <text x="84" y="218" font-size="16" fill="#d8d8d8">Product Architecture</text>

  <rect x="60" y="238" width="340" height="58" rx="4" fill="url(#stackglow)" opacity="0.7"/>
  <rect x="60" y="238" width="4" height="58" rx="2" fill="#9b7fd4"/>
  <text x="84" y="261" font-size="11" fill="#9b7fd4" letter-spacing="2" opacity="0.9">LAYER 3</text>
  <text x="84" y="282" font-size="16" fill="#d8d8d8">Technology Delivery</text>

  <rect x="60" y="302" width="340" height="58" rx="4" fill="url(#stackglow)" opacity="0.6"/>
  <rect x="60" y="302" width="4" height="58" rx="2" fill="#d46b5b"/>
  <text x="84" y="325" font-size="11" fill="#d46b5b" letter-spacing="2" opacity="0.9">LAYER 4</text>
  <text x="84" y="346" font-size="16" fill="#d8d8d8">Engineering Organization</text>

  <rect x="60" y="366" width="340" height="58" rx="4" fill="url(#stackglow)" opacity="0.5"/>
  <rect x="60" y="366" width="4" height="58" rx="2" fill="#d4a05b"/>
  <text x="84" y="389" font-size="11" fill="#d4a05b" letter-spacing="2" opacity="0.9">LAYER 5</text>
  <text x="84" y="410" font-size="16" fill="#d8d8d8">People &amp; Talent</text>

  <rect x="60" y="430" width="340" height="58" rx="4" fill="url(#stackglow)" opacity="0.4"/>
  <rect x="60" y="430" width="4" height="58" rx="2" fill="#4caf9a"/>
  <text x="84" y="453" font-size="11" fill="#4caf9a" letter-spacing="2" opacity="0.9">LAYER 6</text>
  <text x="84" y="474" font-size="16" fill="#d8d8d8">Infrastructure</text>

  <rect x="60" y="494" width="340" height="58" rx="4" fill="url(#stackglow)" opacity="0.3"/>
  <rect x="60" y="494" width="4" height="58" rx="2" fill="#5b9ad4"/>
  <text x="84" y="517" font-size="11" fill="#5b9ad4" letter-spacing="2" opacity="0.9">LAYER 7</text>
  <text x="84" y="538" font-size="16" fill="#d8d8d8">Developer Productivity</text>

  <!-- Vertical divider -->
  <line x1="440" y1="80" x2="440" y2="570" stroke="#2a2a3a" stroke-width="1"/>

  <!-- Right: title block -->
  <text x="500" y="148" font-size="15" fill="#666" letter-spacing="3" font-family="'Georgia', serif">TECTONICS  ·  ALI AHMED THAWERANI</text>

  <!-- Main title -->
  <text x="500" y="232" font-size="58" font-weight="bold" fill="#f0f0f0" font-family="'Georgia', serif" letter-spacing="-1">The CTO</text>
  <text x="500" y="306" font-size="58" font-weight="bold" fill="#f0f0f0" font-family="'Georgia', serif" letter-spacing="-1">Decision</text>
  <text x="500" y="380" font-size="58" font-weight="bold" fill="#4caf6e" font-family="'Georgia', serif" letter-spacing="-1">Stack</text>

  <!-- Divider line -->
  <line x1="500" y1="406" x2="1140" y2="406" stroke="#2a2a3a" stroke-width="1"/>

  <!-- Subtitle -->
  <text x="500" y="438" font-size="18" fill="#888" font-family="'Georgia', serif" font-style="italic">The hidden layers behind</text>
  <text x="500" y="464" font-size="18" fill="#888" font-family="'Georgia', serif" font-style="italic">every CTO decision —</text>
  <text x="500" y="490" font-size="18" fill="#888" font-family="'Georgia', serif" font-style="italic">costs more than anyone planned.</text>

  <!-- Bottom line -->
  <line x1="60" y1="594" x2="1140" y2="594" stroke="#1e1e2e" stroke-width="1"/>
  <text x="60" y="616" font-size="11" fill="#333" letter-spacing="2" font-family="'Georgia', serif">aathawerani.github.io</text>
</svg>
